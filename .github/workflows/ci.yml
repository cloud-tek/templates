name: ci

on:
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
    - edited
    # - closed
    branches:
    - main
  workflow_dispatch:

jobs:
  pre-build-templates:
    name: ${{ matrix.svc }} ${{ matrix.dotnet-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        svc:
        - job
        - microservice
        - microservice-api
        - microservice-minimal-api
        - microservice-graphql-api
        - microservice-grpc-api
        - microservice-grpc-minimal-api
        os:
        - ubuntu-latest
        # - windows-latest
        - macos-latest
        dotnet-version:
        - '10.0.100'
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: '0'
    - name: nuget.config (pwsh)
      shell: pwsh
      run: |
        $nuget = @"
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
          </packageSources>
          <packageRestore>
            <add key="enabled" value="True" />
            <add key="automatic" value="True" />
          </packageRestore>
          <bindingRedirects>
            <add key="skip" value="False" />
          </bindingRedirects>
          <packageManagement>
            <add key="format" value="0" />
            <add key="disabled" value="False" />
          </packageManagement>
          <!--<packageSourceCredentials>
            <nuget.cloudtek.io>
              <add key="Username" value="..."/>
              <add key="ClearTextPassword" value="..." />
            </nuget.cloudtek.io>
          </packageSourceCredentials>-->
        </configuration>
        "@

        $nuget | Out-File -FilePath ${{ github.workspace }}/nuget.config

    - name: dotnet tool restore
      run: dotnet tool restore
      shell: bash
    - uses: actions/setup-dotnet@v3
      name: dotnet installer
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
    - name: dotnet restore
      run: |
        dotnet restore ProjectName.ServiceName.sln
      shell: bash
      working-directory: ${{ matrix.svc }}
    - name: dotnet build
      run: |
        dotnet build ProjectName.ServiceName.sln
      shell: bash
      working-directory: ${{ matrix.svc }}

  render-templates:
    name: ${{ matrix.dotnet-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs:
    - pre-build-templates
    strategy:
      matrix:
        os:
        - ubuntu-latest
        # - windows-latest
        - macos-latest
        dotnet-version:
        - '10.0.x'
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: '0'
    - name: nuget.config (pwsh)
      shell: pwsh
      run: |
        $nuget = @"
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
          </packageSources>
          <packageRestore>
            <add key="enabled" value="True" />
            <add key="automatic" value="True" />
          </packageRestore>
          <bindingRedirects>
            <add key="skip" value="False" />
          </bindingRedirects>
          <packageManagement>
            <add key="format" value="0" />
            <add key="disabled" value="False" />
          </packageManagement>
          <!--<packageSourceCredentials>
            <nuget.cloudtek.io>
              <add key="Username" value="..."/>
              <add key="ClearTextPassword" value="..." />
            </nuget.cloudtek.io>
          </packageSourceCredentials>-->
        </configuration>
        "@

        $nuget | Out-File -FilePath ${{ github.workspace }}/nuget.config
    - name: dotnet tool restore
      run: dotnet tool restore
      shell: bash
    - uses: actions/setup-dotnet@v3
      name: dotnet installer
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
    - name: Perform a Pester test from the Templates.Tests.ps1 file
      shell: pwsh
      run: |
        Install-Module Pester -Force
        $cfg = New-PesterConfiguration
        $cfg.Run.Path = '${{ github.workspace }}/Templates.Tests.ps1'
        $cfg.Filter.Tag = 'template-rendering'
        $cfg.TestResult.Enabled = $true
        $cfg.TestResult.OutputFormat = 'JUnitXml'
        $cfg.TestResult.OutputPath = '${{ github.workspace }}/TestResults.xml'
        $cfg.Run.PassThru = $true
        $p = Invoke-Pester -Configuration $cfg
        if ($p.FailedCount -gt 0) { exit 1 }
    - name: Publish Pester results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: ${{ github.job }} (${{ matrix.os }})
        path: ${{ github.workspace }}/TestResults.xml
        reporter: java-junit

  post-build-templates:
    name: ${{ matrix.dotnet-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs:
    - render-templates
    strategy:
      matrix:
        os:
        - ubuntu-latest
        # - windows-latest
        - macos-latest
        dotnet-version:
        - '10.0.x'
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: '0'
    - name: nuget.config (pwsh)
      shell: pwsh
      run: |
        $nuget = @"
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
          </packageSources>
          <packageRestore>
            <add key="enabled" value="True" />
            <add key="automatic" value="True" />
          </packageRestore>
          <bindingRedirects>
            <add key="skip" value="False" />
          </bindingRedirects>
          <packageManagement>
            <add key="format" value="0" />
            <add key="disabled" value="False" />
          </packageManagement>
          <!---<packageSourceCredentials>
            <nuget.cloudtek.io>
              <add key="Username" value="..."/>
              <add key="ClearTextPassword" value="..." />
            </nuget.cloudtek.io>
          </packageSourceCredentials>-->
        </configuration>
        "@

        $nuget | Out-File -FilePath ${{ github.workspace }}/nuget.config
    - name: dotnet tool restore
      run: dotnet tool restore
      shell: bash
    - uses: actions/setup-dotnet@v3
      name: dotnet installer
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
    - name: Perform a Pester test from the Templates.Tests.ps1 file
      shell: pwsh
      run: |
        Install-Module Pester -Force
        $cfg = New-PesterConfiguration
        $cfg.Run.Path = '${{ github.workspace }}/Templates.Tests.ps1'
        $cfg.Filter.Tag = 'template-build'
        $cfg.TestResult.Enabled = $true
        $cfg.TestResult.OutputFormat = 'JUnitXml'
        $cfg.TestResult.OutputPath = '${{ github.workspace }}/TestResults.xml'
        $cfg.Run.PassThru = $true
        $p = Invoke-Pester -Configuration $cfg
        if ($p.FailedCount -gt 0) { exit 1 }
    - name: Publish Pester results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: ${{ github.job }} (${{ matrix.os }})
        path: ${{ github.workspace }}/TestResults.xml
        reporter: java-junit

  run-templates:
    name: ${{ matrix.dotnet-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs:
    - post-build-templates
    strategy:
      matrix:
        os:
        - ubuntu-latest
        # - windows-latest
        - macos-latest
        dotnet-version:
        - '10.0.x'
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: '0'
    - name: nuget.config (pwsh)
      shell: pwsh
      run: |
        $nuget = @"
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
          </packageSources>
          <packageRestore>
            <add key="enabled" value="True" />
            <add key="automatic" value="True" />
          </packageRestore>
          <bindingRedirects>
            <add key="skip" value="False" />
          </bindingRedirects>
          <packageManagement>
            <add key="format" value="0" />
            <add key="disabled" value="False" />
          </packageManagement>
          <!--<packageSourceCredentials>
            <nuget.cloudtek.io>
              <add key="Username" value="..."/>
              <add key="ClearTextPassword" value="..." />
            </nuget.cloudtek.io>
          </packageSourceCredentials>-->
        </configuration>
        "@

        $nuget | Out-File -FilePath ${{ github.workspace }}/nuget.config
    - name: dotnet tool restore
      run: dotnet tool restore
      shell: bash
    - uses: actions/setup-dotnet@v3
      name: dotnet installer
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
    - name: Perform a Pester test from the Templates.Tests.ps1 file
      shell: pwsh
      run: |
        Install-Module Pester -Force
        $cfg = New-PesterConfiguration
        $cfg.Run.Path = '${{ github.workspace }}/Templates.Tests.ps1'
        $cfg.Filter.Tag = 'template-run'
        $cfg.TestResult.Enabled = $true
        $cfg.TestResult.OutputFormat = 'JUnitXml'
        $cfg.TestResult.OutputPath = '${{ github.workspace }}/TestResults.xml'
        $cfg.Run.PassThru = $true
        $p = Invoke-Pester -Configuration $cfg
        if ($p.FailedCount -gt 0) { exit 1 }
    - name: Upload template run logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: template-run-logs-${{ matrix.os }}
        path: |
          ${{ github.workspace }}/tests/run-trace.log
          ${{ github.workspace }}/tests/**/stdout.log
          ${{ github.workspace }}/tests/**/stderr.log
        if-no-files-found: ignore
    - name: Publish Pester results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: ${{ github.job }} (${{ matrix.os }})
        path: ${{ github.workspace }}/TestResults.xml
        reporter: java-junit
